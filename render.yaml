services:
  - type: web_service
    name: flipkart-sample44-backend
    env: docker
    plan: starter
    branch: main
    dockerfilePath: Dockerfile
    healthCheckPath: /health.php
    releaseCommand: bash -lc "mysql -h \"$DB_HOST\" -u \"$DB_USER\" -p\"$DB_PASS\" -e \"CREATE DATABASE IF NOT EXISTS \\\"$DB_NAME\\\";\" && mysql -h \"$DB_HOST\" -u \"$DB_USER\" -p\"$DB_PASS\" \"$DB_NAME\" < /var/www/html/database/ecommerce.sql && mysql -h \"$DB_HOST\" -u \"$DB_USER\" -p\"$DB_PASS\" \"$DB_NAME\" < /var/www/html/database/migration_customer.sql || true"
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_CHARSET
        sync: false
      - key: APP_BASE_URL
        sync: false
